<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>检测结果查询 - 视频分析系统</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/modal.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      background-color: #1a3a5c;
      color: white;
      height: 60px;
    }
    .nav-buttons {
      display: flex;
    }
    .nav-button {
      color: white;
      background: none;
      border: none;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 16px;
      border-bottom: 3px solid transparent;
    }
    .nav-button.active, .nav-button:hover {
      border-bottom-color: #4fc3f7;
    }
    .main-container {
      display: flex;
      height: calc(100vh - 60px);
    }
    .content-container {
      flex: 1;
      overflow: hidden;
      background-color: #0f2033;
      position: relative;
    }
    .control-panel {
      width: 340px;
      background-color: #1a3a5c;
      padding: 15px;
      overflow-y: auto;
    }
    .screenshots-view {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .screenshot-display {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #000;
    }
    .screenshot-display img {
      max-width: 100%;
      max-height: 100%;
    }
    .screenshot-controls {
      height: 120px;
      background-color: #0a192f;
      display: flex;
      flex-direction: column;
    }
    .screenshot-navigation {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 10px;
      background-color: #102a43;
    }
    .screenshot-list {
      flex: 1;
      display: flex;
      overflow-x: auto;
      padding: 10px;
      gap: 10px;
    }
    .thumbnail {
      height: 70px;
      border: 2px solid transparent;
      cursor: pointer;
    }
    .thumbnail.active {
      border-color: #4fc3f7;
    }
    .thumbnail:hover {
      border-color: #a5d6f7;
    }
    .control-title {
      font-size: 18px;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .section-title {
      font-size: 14px;
      color: #4fc3f7;
      margin: 15px 0 10px;
    }
    .control-button {
      background-color: #2a5885;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }
    .control-button:hover {
      background-color: #3a6fa5;
    }
  </style>
</head>
<body>
  <div class="nav-bar">
    <h2>智能视频分析系统</h2>
    <div class="nav-buttons">
      <a href="/" class="nav-button">数据导入与配置</a>
      <a href="/detection_results" class="nav-button active">检测结果查询</a>
      <a href="/database_admin" class="nav-button">数据库管理</a>
    </div>
  </div>

  <div class="main-container">
    <div class="content-container">
      <div class="screenshots-view">
        <div class="screenshot-display">
          <canvas id="annotationCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></canvas>
          <img id="screenshotImage" src="" alt="检测结果预览" />
        </div>
        <div class="screenshot-controls">
          <div class="screenshot-navigation">
            <button class="control-button" id="prevButton" style="padding: 5px 10px;">
              <i class="fa fa-chevron-left"></i> 上一张
            </button>
            <span id="screenshotInfo"></span>
            <button class="control-button" id="nextButton" style="padding: 5px 10px;">
              下一张 <i class="fa fa-chevron-right"></i>
            </button>
          </div>
          <div class="screenshot-list" id="screenshotsList">
            <!-- 缩略图将在这里显示检测相关的图片 -->
          </div>
        </div>
      </div>
    </div>

    <div class="control-panel">
      <h2 class="control-title">检测结果查询与分析</h2>
      <h3 class="section-title">筛选条件</h3>
      <div>
        <label for="dateRange">日期范围:</label>
        <input type="date" id="startDate" name="startDate">
        <input type="date" id="endDate" name="endDate">
      </div>
      <div>
        <label for="videoSource">视频源:</label>
        <select id="videoSourceFilter" name="videoSourceFilter">
          <option value="">全部</option>
          <!-- 视频源选项将动态加载 -->
        </select>
      </div>
      <div>
        <label for="objectClass">目标类别:</label>
        <input type="text" id="objectClassFilter" name="objectClassFilter" placeholder="例如: person, car">
      </div>
      <button class="control-button" id="queryResultsBtn">查询检测结果</button>
      
      <h3 class="section-title">检测结果统计</h3>
      <div id="statsChartContainer" style="height: 200px; background: #0c2846; display:flex; align-items:center; justify-content:center; color:#aaa;">图表区域</div>
      
      <h3 class="section-title">当前图像信息</h3>
      <div id="currentImageInfo" style="background: #0c2846; padding: 10px; border-radius: 4px; font-size: 14px;">
        <p>请选择一个检测结果以查看详细信息</p>
      </div>
    </div>
  </div>

  <script src="/static/js/jquery-3.5.1.min.js"></script>
  <script src="/static/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/detection_results.js"></script>
  
  <script>
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', function() {
      // 如果URL中包含result_id参数，直接加载该检测结果
      const urlParams = new URLSearchParams(window.location.search);
      const resultId = urlParams.get('result_id');
      
      if (resultId) {
        // 直接加载指定的检测结果
        showDetectionDetail(resultId);
      } else {
        // 初始化检测结果页面
        initDetectionResults();
      }
      
      // 绑定导航按钮事件
      document.getElementById('prevButton').addEventListener('click', function() {
        navigateImages(-1);
      });
      
      document.getElementById('nextButton').addEventListener('click', function() {
        navigateImages(1);
      });
    });
  </script>
</body>
</html>
